name: Build Android APK

# Builds the installable Android .apk on Expo's cloud (EAS), triggered from
# GitHub (which has internet to reach Expo). The Expo token is passed as an
# input at trigger time (and masked in logs).

on:
  workflow_dispatch:
    inputs:
      expo_token:
        description: "Expo access token (expo.dev → Account → Settings → Access Tokens)"
        required: true
      api_url:
        description: "Backend URL the app talks to (EXPO_PUBLIC_API_URL)"
        required: false
        default: "https://kiwiparty-web.onrender.com"

jobs:
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Mask token
        run: echo "::add-mask::${{ inputs.expo_token }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Set backend URL in eas.json
        run: |
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('eas.json','utf8'));for(const p of Object.values(j.build)){if(p.env)p.env.EXPO_PUBLIC_API_URL='${{ inputs.api_url }}';}fs.writeFileSync('eas.json',JSON.stringify(j,null,2));"
          echo "Backend URL set to: ${{ inputs.api_url }}"

      - run: npm ci

      - name: Link/create the EAS project
        env:
          EXPO_TOKEN: ${{ inputs.expo_token }}
        run: |
          npx eas-cli@latest whoami || true
          npx eas-cli@latest init --non-interactive --force || npx eas-cli@latest init --non-interactive || true

      - name: Build Android APK on EAS (cloud)
        env:
          EXPO_TOKEN: ${{ inputs.expo_token }}
        run: |
          set -o pipefail
          npx eas-cli@latest build --platform android --profile preview --non-interactive --no-wait 2>&1 | tee /tmp/build.out
          echo ""
          echo "===== BUILD LINK ====="
          grep -Eo 'https://expo.dev/[^ ]+' /tmp/build.out | tail -1 || echo "No build URL captured — see logs above."
