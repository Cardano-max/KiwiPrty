name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  web:
    name: web — typecheck, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      # Build/generate don't connect to a DB (pages are dynamic), but Prisma
      # likes a value present.
      DATABASE_URL: "file:./ci.db"
      JWT_SECRET: "ci-secret"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck
